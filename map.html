<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracks Map — Helmet Cam Heroes</title>
<meta name="description" content="Explore every driven circuit and configuration plotted on our interactive map. View distance and layouts for our championship venues.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<style>
  :root {
    --gold:   #e8c84a;
    --green:  #4ae8a0;
    --blue:   #4ab8e8;
    --red:    #e84a4a;
    --bg:     #07070d;
    --surface: #0f0f1a;
    --line:   #1c1c2a;
    --dim:    #333344;
    --muted:  #666677;
    --text:   #ddddf0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Barlow', sans-serif;
    color: var(--text);
    height: 100vh;
    height: 100dvh; /* dvh tracks the mobile URL bar so the map isn't clipped */
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-top: var(--nav-h, 56px); /* live height — nav.js keeps this in sync */
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color .2s;
    flex-shrink: 0;
  }

  .back-btn:hover { color: var(--text); }

  .back-arrow {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .topbar-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 3px;
    color: #fff;
    flex: 1;
  }
  .header-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .nav-pill {
    background: rgba(255,255,255,.06); backdrop-filter: blur(8px);
    color: var(--muted); text-decoration: none; padding: 5px 12px;
    border-radius: 6px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; transition: all .2s;
    border: 1px solid var(--line); white-space: nowrap;
  }
  .nav-pill:hover {
    background: rgba(232,200,74,.15); border-color: rgba(232,200,74,.4);
    color: var(--gold); transform: translateY(-2px);
  }

  .topbar-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    background: rgba(74,232,160,.1);
    border: 1px solid rgba(74,232,160,.2);
    padding: 4px 10px;
    border-radius: 3px;
  }

  .near-me-btn {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); background: rgba(232,200,74,.1);
    border: 1px solid rgba(232,200,74,.3);
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: all .2s;
  }
  .near-me-btn:hover { background: rgba(232,200,74,.2); border-color: var(--gold); }
  .near-me-btn:disabled { opacity: .5; cursor: default; }

  /* The shared sheet (loaded after this block) flips .header/.topbar to a
     stacked column under 900px — which drops "Near me" onto a second row and
     over the sidebar. This page's topbar is a single row, so keep it one: the
     extra class outranks the shared rule without needing !important. */
  .has-fixed-nav .topbar { flex-direction: row; align-items: center; }

  /* "You are here" marker */
  .user-loc-marker {
    width: 18px; height: 18px; border-radius: 50%;
    background: #4ab8e8; border: 2px solid #fff;
    box-shadow: 0 0 0 4px rgba(74,184,232,.3), 0 0 14px rgba(74,184,232,.6);
    animation: userPulse 2s ease-in-out infinite;
  }
  @keyframes userPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(74,184,232,.3), 0 0 14px rgba(74,184,232,.6); }
    50%      { box-shadow: 0 0 0 9px rgba(74,184,232,.12), 0 0 14px rgba(74,184,232,.6); }
  }

  /* ── LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
  }

  .sidebar-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .sidebar-count {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--green);
    line-height: 1;
  }

  .sidebar-count span {
    font-size: 14px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    font-weight: 400;
  }

  .tracks-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .tracks-list::-webkit-scrollbar { width: 3px; }
  .tracks-list::-webkit-scrollbar-track { background: transparent; }
  .tracks-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .track-card {
    padding: 14px 16px;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all .2s ease;
    border: 1px solid transparent;
    position: relative;
  }

  .track-card:hover {
    background: rgba(255,255,255,.04);
    border-color: var(--line);
  }

  .track-card.active {
    background: rgba(74,232,160,.07);
    border-color: rgba(74,232,160,.2);
  }

  .track-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }

  .track-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-top: 5px;
    box-shadow: 0 0 8px rgba(74,232,160,.5);
  }

  .track-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: .4px;
    flex: 1;
    line-height: 1.2;
  }

  .track-sessions {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--green);
    background: rgba(74,232,160,.1);
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .track-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .track-meta-item {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .track-configs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .config-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--dim);
    padding: 2px 7px;
    border-radius: 3px;
  }

  .track-best {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .track-best-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .track-best-time {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--gold);
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    background: #0a0a14;
  }

  /* CartoDB dark tiles — no filter needed */

  /* Custom marker */
  .custom-marker {
    width: 36px;
    height: 36px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }

  .custom-marker-inner {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    transform: rotate(45deg);
  }

  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--line) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
    color: var(--text) !important;
  }

  .leaflet-popup-tip {
    background: var(--surface) !important;
  }

  .popup-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 4px;
  }

  .popup-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 12px;
    display: block;
  }

  .popup-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .popup-stat-val {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    letter-spacing: 1px;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .popup-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .popup-link {
    display: block;
    text-align: center;
    padding: 8px 16px;
    background: rgba(74,232,160,.1);
    border: 1px solid rgba(74,232,160,.2);
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    text-decoration: none;
    transition: background .2s;
    margin-top: 10px;
  }

  .popup-link:hover { background: rgba(74,232,160,.2); }

  /* Responsive */
  @media (max-width: 768px) {
    /* Topbar: keep it to one tidy row. Drop the venue tag (redundant with the
       sidebar count) and shrink the title so the title + "Near me" always fit. */
    .topbar { padding: 0 14px; height: 50px; gap: 10px; }
    .topbar-title { font-size: 19px; letter-spacing: 2px; }
    .topbar-tag { display: none; }
    .near-me-btn { padding: 6px 12px; font-size: 11px; }

    .main { flex-direction: column; }

    /* Sidebar becomes a compact horizontal strip so the map gets the room. */
    .sidebar {
      width: 100%;
      height: auto;
      flex-shrink: 0;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }
    .sidebar-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 9px 14px;
    }
    .sidebar-count { font-size: 24px; }
    .sidebar-count span { font-size: 12px; }

    .tracks-list {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 14px;
      gap: 8px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch; /* momentum scroll on iOS */
      overscroll-behavior-x: contain;    /* don't trigger page/back swipe */
    }
    .tracks-list::-webkit-scrollbar { height: 3px; }
    .track-card {
      min-width: 78vw;
      max-width: 78vw;
      margin-bottom: 0;
      padding: 12px 14px;
      scroll-snap-align: start;
    }

    /* Always leave a usefully large map below the strip. */
    #map { flex: 1; min-height: 46vh; }

    /* Roomier touch targets on the leaflet zoom buttons. */
    .leaflet-touch .leaflet-bar a { width: 34px; height: 34px; line-height: 34px; }
  }

  @media (max-width: 380px) {
    .topbar-title { font-size: 17px; letter-spacing: 1px; }
    .track-card { min-width: 84vw; max-width: 84vw; }
  }
</style>

<body class="has-fixed-nav">

<nav class="header-nav" aria-label="Site navigation"></nav>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">Tracks Map</div>
  <div class="topbar-tag" id="venue-count">Venues</div>
  <button class="near-me-btn" id="near-me-btn" title="Center the map on your location">📍 Near me</button>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">Circuits Driven</div>
      <div class="sidebar-count">4 <span>tracks</span></div>
    </div>
    <div class="tracks-list" id="tracks-list"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {

let tracks = [];

// Init map centered on Lithuania
const map = L.map('map', {
  center: [54.75, 24.9],
  zoom: 9,
  zoomControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// Repaint after orientation change / soft-keyboard resize — without this
// Leaflet leaves grey gaps where tiles didn't lay out for the new size.
let resizeT;
const refreshMapSize = () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => map.invalidateSize(), 150);
};
window.addEventListener('resize', refreshMapSize);
window.addEventListener('orientationchange', refreshMapSize);

const markers = {};
const popupContent = (t) => `
  <div style="padding:4px;min-width:200px;">
    <div class="popup-title">${t.name}</div>
    <span class="popup-tag">${t.note}</span>
    <div class="popup-stats">
      <div>
        <span class="popup-stat-val">${t.sessions}</span>
        <span class="popup-stat-label">Sessions</span>
      </div>
      <div>
        <span class="popup-stat-val">${t.configs ? t.configs.length : 0}</span>
        <span class="popup-stat-label">Configs</span>
      </div>
      <div>
        <span class="popup-stat-val" style="font-size:18px">${t.bestLap || '--:--'}</span>
        <span class="popup-stat-label">Track Record</span>
      </div>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#666677;margin-bottom:4px;">By ${t.bestDriver || 'N/A'}</div>
    <a href="${t.mapsLink}" target="_blank" class="popup-link">Open in Google Maps ↗</a>
  </div>
`;

// Sidebar
const list = document.getElementById('tracks-list');
let activeId = null;

// ── Location centering (Geolocation API — free, no backend) ──────────────
// We remember the user's LAST map view (center + zoom), not a fixed point,
// so panning is respected on return and a saved spot never goes stale. The
// "Near me" button always fetches a fresh fix.
const VIEW_KEY = 'hch:mapView';
let userMarker = null;

const placedTracks = () => tracks.filter(t => !(t.lat === 0 && t.lng === 0));

function fitAllTracks() {
  const pts = placedTracks().map(t => [t.lat, t.lng]);
  if (pts.length) map.fitBounds(L.latLngBounds(pts), { padding: [50, 50], maxZoom: 11 });
}

function haversine(aLat, aLng, bLat, bLng) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(bLat - aLat), dLng = toRad(bLng - aLng);
  const s = Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(aLat)) * Math.cos(toRad(bLat)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function nearestTrack(lat, lng) {
  let best = null, bestD = Infinity;
  placedTracks().forEach(t => {
    const d = haversine(lat, lng, t.lat, t.lng);
    if (d < bestD) { bestD = d; best = t; }
  });
  return best;
}

// Drop a "you are here" marker and frame the user together with their
// nearest track. The resulting view is persisted by the moveend handler.
function showUserLocation(lat, lng) {
  if (userMarker) map.removeLayer(userMarker);
  const icon = L.divIcon({
    html: '<div class="user-loc-marker"></div>',
    className: '', iconSize: [18, 18], iconAnchor: [9, 9],
  });
  userMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 })
    .addTo(map).bindPopup('You are here');
  const near = nearestTrack(lat, lng);
  if (near) {
    map.fitBounds(L.latLngBounds([[lat, lng], [near.lat, near.lng]]), { padding: [70, 70], maxZoom: 12 });
  } else {
    map.setView([lat, lng], 10, { animate: true });
  }
}

// Persist the current view so the next visit restores exactly where the user
// left the map (handles panning — no snapping back to a stale location).
function saveView() {
  try {
    const c = map.getCenter();
    localStorage.setItem(VIEW_KEY, JSON.stringify({ lat: c.lat, lng: c.lng, zoom: map.getZoom() }));
  } catch (e) {}
}

// First view: restore the last view if we have one, otherwise frame all tracks
// (better than the fixed default — Spain/Norway venues were off-screen).
function applyInitialView() {
  let v = null;
  try { v = JSON.parse(localStorage.getItem(VIEW_KEY) || 'null'); } catch (e) {}
  if (v && typeof v.lat === 'number' && typeof v.lng === 'number' && typeof v.zoom === 'number') {
    map.setView([v.lat, v.lng], v.zoom);
  } else {
    fitAllTracks();
  }
  map.on('moveend', saveView); // remember subsequent pans/zooms
}

const nearBtn = document.getElementById('near-me-btn');
if (nearBtn) {
  if (!('geolocation' in navigator)) { nearBtn.disabled = true; nearBtn.title = 'Geolocation not supported'; }
  nearBtn.addEventListener('click', () => {
    if (!('geolocation' in navigator)) return;
    nearBtn.disabled = true; nearBtn.textContent = '📍 Locating…';
    navigator.geolocation.getCurrentPosition(
      pos => {
        nearBtn.disabled = false; nearBtn.textContent = '📍 Near me';
        showUserLocation(pos.coords.latitude, pos.coords.longitude);
      },
      err => {
        nearBtn.disabled = false;
        nearBtn.textContent = err.code === 1 ? '📍 Denied' : '📍 Unavailable';
        setTimeout(() => { nearBtn.textContent = '📍 Near me'; }, 2200);
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
    );
  });
}

// Fetch auto-generated map data
fetch('sessions/tracks-list.json', { cache: 'no-cache' })
  .then(res => res.json())
  .then(data => {
    tracks = data;
    
    // Update sidebar count + topbar tag (only count tracks we can place)
    const placed = tracks.filter(t => !(t.lat === 0 && t.lng === 0)).length;
    const countEl = document.querySelector('.sidebar-count');
    if (countEl) countEl.innerHTML = `${placed} <span>tracks</span>`;
    const venueEl = document.getElementById('venue-count');
    if (venueEl) venueEl.textContent = `${placed} Venues`;

    tracks.forEach(t => {
      // Don't draw tracks missing GPS coordinates
      if (t.lat === 0 && t.lng === 0) return;

      const icon = L.divIcon({
        html: `<div style="
          width:36px;height:36px;
          background:${t.color};
          border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 4px 20px rgba(0,0,0,.5), 0 0 20px ${t.color}44;
        "><div style="width:12px;height:12px;border-radius:50%;background:rgba(0,0,0,.5);"></div></div>`,
        className: '',
        iconSize: [36, 36],
        iconAnchor: [18, 36],
        popupAnchor: [0, -38],
      });

      const marker = L.marker([t.lat, t.lng], { icon })
        .addTo(map)
        .bindPopup(popupContent(t), { maxWidth: 260 });

      markers[t.id] = marker;

      // Create card
      const card = document.createElement('div');
      card.className = 'track-card';
      card.id = `card-${t.id}`;
      card.innerHTML = `
        <div class="track-card-header">
          <div class="track-dot" style="background:${t.color};box-shadow:0 0 8px ${t.color}66;"></div>
          <div class="track-name">${t.name}</div>
          <div class="track-sessions">${t.sessions} sessions</div>
        </div>
        <div class="track-meta">
          <div class="track-meta-item">📍 ${t.note}</div>
        </div>
        <div class="track-configs">
          ${(t.configs || []).map(c => `<span class="config-tag">${c}</span>`).join('')}
        </div>
        <div class="track-best">
          <div class="track-best-label">Track Record</div>
          <div class="track-best-time">${t.bestLap || '--:--'}</div>
        </div>
      `;

      card.addEventListener('click', () => {
        // Reset all
        document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        activeId = t.id;

        map.setView([t.lat, t.lng], 13, { animate: true });
        markers[t.id].openPopup();
      });

      list.appendChild(card);
    });

    applyInitialView();
  })
  .catch(err => {
    console.error("Error loading map data:", err);
    list.innerHTML = '<div style="padding: 20px; color: var(--red);">Failed to load map data.</div>';
  });

}); // End of DOMContentLoaded
</script>
<script src="js/nav.js"></script>
</body>
</html>
