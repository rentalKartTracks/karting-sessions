<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracks Map — Helmet Cam Heroes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --gold:   #e8c84a;
    --green:  #4ae8a0;
    --blue:   #4ab8e8;
    --red:    #e84a4a;
    --bg:     #07070d;
    --surface: #0f0f1a;
    --line:   #1c1c2a;
    --dim:    #333344;
    --muted:  #666677;
    --text:   #ddddf0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Barlow', sans-serif;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color .2s;
    flex-shrink: 0;
  }

  .back-btn:hover { color: var(--text); }

  .back-arrow {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .topbar-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 3px;
    color: #fff;
    flex: 1;
  }
  .header-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .nav-pill {
    background: rgba(255,255,255,.06); backdrop-filter: blur(8px);
    color: var(--muted); text-decoration: none; padding: 5px 12px;
    border-radius: 6px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; transition: all .2s;
    border: 1px solid var(--line); white-space: nowrap;
  }
  .nav-pill:hover {
    background: rgba(232,200,74,.15); border-color: rgba(232,200,74,.4);
    color: var(--gold); transform: translateY(-2px);
  }

  .topbar-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    background: rgba(74,232,160,.1);
    border: 1px solid rgba(74,232,160,.2);
    padding: 4px 10px;
    border-radius: 3px;
  }

  /* ── LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
  }

  .sidebar-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .sidebar-count {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--green);
    line-height: 1;
  }

  .sidebar-count span {
    font-size: 14px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    font-weight: 400;
  }

  .tracks-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .tracks-list::-webkit-scrollbar { width: 3px; }
  .tracks-list::-webkit-scrollbar-track { background: transparent; }
  .tracks-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .track-card {
    padding: 14px 16px;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all .2s ease;
    border: 1px solid transparent;
    position: relative;
  }

  .track-card:hover {
    background: rgba(255,255,255,.04);
    border-color: var(--line);
  }

  .track-card.active {
    background: rgba(74,232,160,.07);
    border-color: rgba(74,232,160,.2);
  }

  .track-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }

  .track-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-top: 5px;
    box-shadow: 0 0 8px rgba(74,232,160,.5);
  }

  .track-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: .4px;
    flex: 1;
    line-height: 1.2;
  }

  .track-sessions {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--green);
    background: rgba(74,232,160,.1);
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .track-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .track-meta-item {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .track-configs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .config-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--dim);
    padding: 2px 7px;
    border-radius: 3px;
  }

  .track-best {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .track-best-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .track-best-time {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--gold);
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    background: #0a0a14;
  }

  /* CartoDB dark tiles — no filter needed */

  /* Custom marker */
  .custom-marker {
    width: 36px;
    height: 36px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }

  .custom-marker-inner {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    transform: rotate(45deg);
  }

  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--line) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
    color: var(--text) !important;
  }

  .leaflet-popup-tip {
    background: var(--surface) !important;
  }

  .popup-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 4px;
  }

  .popup-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 12px;
    display: block;
  }

  .popup-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .popup-stat-val {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    letter-spacing: 1px;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .popup-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .popup-link {
    display: block;
    text-align: center;
    padding: 8px 16px;
    background: rgba(74,232,160,.1);
    border: 1px solid rgba(74,232,160,.2);
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    text-decoration: none;
    transition: background .2s;
    margin-top: 10px;
  }

  .popup-link:hover { background: rgba(74,232,160,.2); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 100%; height: 220px; border-right: none; border-bottom: 1px solid var(--line); }
    .main { flex-direction: column; }
    .tracks-list { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 8px; gap: 4px; }
    .track-card { min-width: 200px; margin-bottom: 0; }
    .nav-pill { font-size: 9px; padding: 4px 8px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">Tracks Map</div>
  <div class="topbar-tag">4 Venues</div>

  <nav class="header-nav">
    <a href="hub.html"          class="nav-pill">HUB</a>
    <a href="sessions.html"     class="nav-pill">SESSIONS</a>
    <a href="championship.html" class="nav-pill">CHAMPIONSHIP</a>
  </nav>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">Circuits Driven</div>
      <div class="sidebar-count">4 <span>tracks</span></div>
    </div>
    <div class="tracks-list" id="tracks-list"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<script>
const tracks = [
  {
    id: 'speedway',
    name: 'Speedway',
    lat: 54.6770,
    lng: 25.2800,
    configs: ['Winter 2026', 'Rain'],
    sessions: 6,
    bestLap: '00:44.327',
    bestDriver: 'Povilas L.',
    mapsLink: 'https://maps.app.goo.gl/oYmMNt3N2fXehzVf9',
    color: '#4ab8e8',
    note: 'Outdoor circuit · Vilnius area',
  },
  {
    id: 'plytines',
    name: 'Plytinės Kartodromas',
    lat: 54.6650,
    lng: 25.2100,
    configs: ['Summer', 'Winter'],
    sessions: 5,
    bestLap: '00:44.030',
    bestDriver: 'Povilas L.',
    mapsLink: 'https://maps.app.goo.gl/AmF51NGm8bysceeN9',
    color: '#a84ae8',
    note: 'Professional karting circuit',
  },
  {
    id: 'vilko',
    name: 'Vilko Kartodromas',
    lat: 54.7200,
    lng: 25.3200,
    configs: ['wolf 2025'],
    sessions: 2,
    bestLap: '00:18.050',
    bestDriver: 'Kęstas Č.',
    mapsLink: 'https://maps.app.goo.gl/9erykKE9f58EYZ9TA',
    color: '#e84a4a',
    note: 'Technical indoor circuit',
  },
  {
    id: 'kartlandas',
    name: 'Kartlandas Kaunas',
    lat: 54.8985,
    lng: 23.9036,
    configs: ['2025'],
    sessions: 3,
    bestLap: '00:25.906',
    bestDriver: 'Povilas L.',
    mapsLink: 'https://maps.app.goo.gl/7Q9SbwwcmwyNqUH56',
    color: '#e8c84a',
    note: 'High-speed Kaunas circuit',
  },
];

// Init map centered on Lithuania
const map = L.map('map', {
  center: [54.75, 24.9],
  zoom: 9,
  zoomControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

const markers = {};
const popupContent = (t) => `
  <div style="padding:4px;min-width:200px;">
    <div class="popup-title">${t.name}</div>
    <span class="popup-tag">${t.note}</span>
    <div class="popup-stats">
      <div>
        <span class="popup-stat-val">${t.sessions}</span>
        <span class="popup-stat-label">Sessions</span>
      </div>
      <div>
        <span class="popup-stat-val">${t.configs.length}</span>
        <span class="popup-stat-label">Configs</span>
      </div>
      <div>
        <span class="popup-stat-val" style="font-size:18px">${t.bestLap}</span>
        <span class="popup-stat-label">Track Record</span>
      </div>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#666677;margin-bottom:4px;">By ${t.bestDriver}</div>
    <a href="${t.mapsLink}" target="_blank" class="popup-link">Open in Google Maps ↗</a>
  </div>
`;

tracks.forEach(t => {
  const icon = L.divIcon({
    html: `<div style="
      width:36px;height:36px;
      background:${t.color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 20px rgba(0,0,0,.5), 0 0 20px ${t.color}44;
    "><div style="width:12px;height:12px;border-radius:50%;background:rgba(0,0,0,.5);"></div></div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -38],
  });

  const marker = L.marker([t.lat, t.lng], { icon })
    .addTo(map)
    .bindPopup(popupContent(t), { maxWidth: 260 });

  markers[t.id] = marker;
});

// Sidebar
const list = document.getElementById('tracks-list');
let activeId = null;

tracks.forEach(t => {
  const card = document.createElement('div');
  card.className = 'track-card';
  card.id = `card-${t.id}`;
  card.innerHTML = `
    <div class="track-card-header">
      <div class="track-dot" style="background:${t.color};box-shadow:0 0 8px ${t.color}66;"></div>
      <div class="track-name">${t.name}</div>
      <div class="track-sessions">${t.sessions} sessions</div>
    </div>
    <div class="track-meta">
      <div class="track-meta-item">📍 ${t.note}</div>
    </div>
    <div class="track-configs">
      ${t.configs.map(c => `<span class="config-tag">${c}</span>`).join('')}
    </div>
    <div class="track-best">
      <div class="track-best-label">Track Record</div>
      <div class="track-best-time">${t.bestLap}</div>
    </div>
  `;

  card.addEventListener('click', () => {
    // Reset all
    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    activeId = t.id;

    map.setView([t.lat, t.lng], 13, { animate: true });
    markers[t.id].openPopup();
  });

  list.appendChild(card);
});
</script>
</body>
</html>
